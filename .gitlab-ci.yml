# DCO 550 Enterprise CI/CD Pipeline
# Author: Principal DevSecOps Engineer

stages:
  - build
  - test
  - deploy

variables:
  # Proxy configuration for GitLab Runners behind corporate proxy
  # These variables ensure that the runner and its children can reach Azure/GCP APIs
  HTTP_PROXY: "http://proxy.internal:8080"
  HTTPS_PROXY: "http://proxy.internal:8080"
  NO_PROXY: "localhost,127.0.0.1,.internal,azure.com,microsoft.com,google.com,github.com"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

# Track 1: Course Website (Containerized)
# Builds the Astro-based website and pushes to Azure Container Registry (ACR)
build_course_site:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - export http_proxy=$HTTP_PROXY
    - export https_proxy=$HTTPS_PROXY
    - echo "Building Track 1: Course Website"
    - cd courses/adversary-hunting
    - docker build 
        --build-arg http_proxy=$HTTP_PROXY 
        --build-arg https_proxy=$HTTPS_PROXY 
        -t $ACR_URL/dco550-site:$CI_COMMIT_SHA .
    - docker login -u $ACR_USER -p $ACR_PASSWORD $ACR_URL
    - docker push $ACR_URL/dco550-site:$CI_COMMIT_SHA

# Track 2: Cyber Range (Packer Image Build)
# Builds the "Modern Hunter's Triad" Windows Golden Images
build_golden_images:
  stage: build
  image: 
    name: hashicorp/packer:latest
    entrypoint: [""]
  script:
    - export http_proxy=$HTTP_PROXY
    - export https_proxy=$HTTPS_PROXY
    - cd infrastructure/packer
    - packer init .
    - packer build 
        -var "client_id=$AZURE_CLIENT_ID" 
        -var "client_secret=$AZURE_CLIENT_SECRET" 
        -var "tenant_id=$AZURE_TENANT_ID" 
        -var "subscription_id=$AZURE_SUBSCRIPTION_ID" .
  rules:
    - changes:
        - infrastructure/packer/**/*
  when: manual

# Track 2: Cyber Range (Terraform Provisioning)
terraform_plan:
  stage: test
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - export http_proxy=$HTTP_PROXY
    - export https_proxy=$HTTPS_PROXY
    - cd infrastructure/terraform
    - terraform init
    - terraform plan -var="student_num=$STUDENT_NUM" -out=tfplan
  artifacts:
    paths:
      - infrastructure/terraform/tfplan

terraform_apply:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - export http_proxy=$HTTP_PROXY
    - export https_proxy=$HTTPS_PROXY
    - cd infrastructure/terraform
    - terraform init
    - terraform apply -auto-approve tfplan
  dependencies:
    - terraform_plan
  when: manual
